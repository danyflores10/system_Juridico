{% load static %}
<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro · Sistema Legislativo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:wght@500;600;700&family=DM+Sans:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'leyes/css/legal-system.css' %}">
  <script src="{% static 'leyes/js/auth-mock.js' %}"></script>
</head>
<body class="legal-auth">
  <div class="legal-auth-bg">
    <div class="legal-auth-bg-pattern"></div>
    <div class="legal-auth-scales" aria-hidden="true">
      <svg viewBox="0 0 200 200" xmlns="http://www.w3.org/2000/svg">
        <path d="M100 20 L100 90 M60 90 L140 90 M60 90 L45 130 M140 90 L155 130"/>
        <circle cx="75" cy="115" r="12"/><circle cx="125" cy="115" r="12"/>
      </svg>
    </div>
  </div>

  <a href="{% static 'leyes/auth/login.html' %}" class="legal-back-home">← Iniciar sesión</a>

  <div class="legal-auth-container" style="max-width:520px">
    <div class="legal-auth-card legal-auth-card--wide">
      <div class="legal-auth-logo">
        <span class="mark" aria-hidden="true">§</span>
        <h1>Solicitar acceso</h1>
        <p>Registro institucional (demo)</p>
      </div>

      <div class="legal-demo-hint">
        <p class="legal-demo-pwd">Use las cuentas demo en <a href="{% static 'leyes/auth/login.html' %}" style="color:var(--legal-gold)">Iniciar sesión</a></p>
      </div>

      <div id="register-error" class="legal-auth-error" hidden role="alert"></div>

      <form id="register-form" class="legal-auth-form" novalidate>
        <div class="legal-form-grid">
          <div class="legal-form-group">
            <label for="reg-nombre">Nombre</label>
            <input type="text" id="reg-nombre" class="legal-input" placeholder="Juan">
          </div>
          <div class="legal-form-group">
            <label for="reg-apellido">Apellido</label>
            <input type="text" id="reg-apellido" class="legal-input" placeholder="Pérez">
          </div>
          <div class="legal-form-group legal-form-group--full">
            <label for="reg-email">Correo institucional</label>
            <input type="email" id="reg-email" class="legal-input" placeholder="usuario@ministerio.gob.bo">
          </div>
        </div>
        <button type="submit" class="legal-btn-primary" data-label="Enviar solicitud">Enviar solicitud</button>
      </form>

      <p class="legal-auth-footer-text">
        ¿Ya tiene acceso? <a href="{% static 'leyes/auth/login.html' %}">Ingresar</a>
      </p>
    </div>
  </div>
  <script src="{% static 'leyes/js/auth.js' %}"></script>
</body>
</html>
